  <rect x="30" y="356" width="220" height="34" rx="8" fill="#4ade80" stroke="#16a34a" stroke-width="1.5"/>
  <text x="140" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">质量审查与引用检查</text>
