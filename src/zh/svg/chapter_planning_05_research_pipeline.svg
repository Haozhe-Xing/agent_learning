  <text x="140" y="170" text-anchor="middle" font-size="12" fill="#15803d">多轮搜索 / 浏览 / 文档读取</text>
  <line x1="140" y1="182" x2="140" y2="198" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

