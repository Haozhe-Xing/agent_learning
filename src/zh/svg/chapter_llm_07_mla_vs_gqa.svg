<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" width="500" height="280" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="500" height="280" rx="12" fill="#f8fafc"/>
  <text x="250" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">GQA vs MLA：KV Cache 压缩思路</text>

  <!-- GQA -->
  <rect x="16" y="46" width="225" height="200" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="128" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">GQA 思路</text>
  <text x="128" y="82" text-anchor="middle" font-size="10" fill="#22c55e">减少 KV 头数</text>

  <rect x="28" y="92" width="201" height="28" rx="6" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="128" y="111" text-anchor="middle" font-size="11" fill="#166534">原始 KV（32 头）</text>

  <line x1="128" y1="120" x2="128" y2="138" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="145" y="132" font-size="10" fill="#22c55e">减少头数</text>

  <rect x="28" y="140" width="201" height="28" rx="6" fill="#4ade80" stroke="#16a34a" stroke-width="1.5"/>
  <text x="128" y="159" text-anchor="middle" font-size="11" fill="#14532d">缓存（8 头，维度不变）</text>

  <rect x="28" y="182" width="201" height="52" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="128" y="200" text-anchor="middle" font-size="11" fill="#166534">缓存大小：</text>
  <text x="128" y="218" text-anchor="middle" font-size="11" fill="#166534">n_kv_heads × head_dim × seq_len</text>
  <text x="128" y="234" text-anchor="middle" font-size="10" fill="#22c55e">缩小 4x</text>

  <!-- MLA -->
  <rect x="259" y="46" width="225" height="200" rx="10" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="371" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#7e22ce">MLA 思路</text>
  <text x="371" y="82" text-anchor="middle" font-size="10" fill="#a855f7">压缩到低维潜在向量</text>

  <rect x="271" y="92" width="201" height="28" rx="6" fill="#e9d5ff" stroke="#c084fc" stroke-width="1"/>
  <text x="371" y="111" text-anchor="middle" font-size="11" fill="#7e22ce">原始 KV（128×128 维）</text>

  <line x1="371" y1="120" x2="371" y2="138" stroke="#a855f7" stroke-width="2" marker-end="url(#arr)"/>
  <text x="388" y="132" font-size="10" fill="#a855f7">压缩</text>

  <rect x="271" y="140" width="201" height="28" rx="6" fill="#a855f7" stroke="#7e22ce" stroke-width="1.5"/>
  <text x="371" y="159" text-anchor="middle" font-size="11" fill="#fff">缓存（512 维潜在向量）</text>

  <line x1="371" y1="168" x2="371" y2="178" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="388" y="176" font-size="9" fill="#a855f7">需要时实时解压</text>

  <rect x="271" y="182" width="201" height="52" rx="6" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="371" y="200" text-anchor="middle" font-size="11" fill="#7e22ce">缓存大小：</text>
  <text x="371" y="218" text-anchor="middle" font-size="11" fill="#7e22ce">kv_lora_rank × seq_len</text>
  <text x="371" y="234" text-anchor="middle" font-size="10" fill="#a855f7">缩小 ~70x</text>

  <!-- 说明 -->
  <rect x="16" y="256" width="468" height="18" rx="4" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="250" y="269" text-anchor="middle" font-size="10" fill="#3730a3">💡 MLA 是 DeepSeek V2/V3 的核心创新，在保持接近 MHA 表达能力的同时大幅降低推理成本</text>
</svg>