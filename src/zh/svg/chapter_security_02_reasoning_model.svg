<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340" width="500" height="340" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="500" height="340" rx="12" fill="#f8fafc"/>
  <text x="250" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">传统模型 vs 推理模型</text>

  <!-- 传统模型 -->
  <rect x="20" y="48" width="210" height="200" rx="10" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="125" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#be123c">传统模型</text>

  <rect x="40" y="82" width="170" height="34" rx="6" fill="#fecdd3" stroke="#fb7185" stroke-width="1"/>
  <text x="125" y="104" text-anchor="middle" font-size="12" fill="#9f1239">问题输入</text>

  <line x1="125" y1="116" x2="125" y2="134" stroke="#f43f5e" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="40" y="136" width="170" height="34" rx="6" fill="#fecdd3" stroke="#fb7185" stroke-width="1"/>
  <text x="125" y="158" text-anchor="middle" font-size="12" fill="#9f1239">直接生成答案</text>

  <line x1="125" y1="170" x2="125" y2="188" stroke="#f43f5e" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="40" y="190" width="170" height="44" rx="6" fill="#fca5a5" stroke="#ef4444" stroke-width="1.5"/>
  <text x="125" y="208" text-anchor="middle" font-size="12" font-weight="bold" fill="#7f1d1d">可能"自信地犯错"</text>
  <text x="125" y="226" text-anchor="middle" font-size="10" fill="#b91c1c">错误率：GPT-4o 38.2%</text>

  <!-- 推理模型 -->
  <rect x="270" y="48" width="210" height="200" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="375" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">推理模型</text>

  <rect x="290" y="82" width="170" height="34" rx="6" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="375" y="104" text-anchor="middle" font-size="12" fill="#166534">问题输入</text>

  <line x1="375" y1="116" x2="375" y2="134" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="290" y="136" width="170" height="54" rx="6" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="375" y="153" text-anchor="middle" font-size="11" fill="#166534">内部推理链：</text>
  <text x="375" y="168" text-anchor="middle" font-size="10" fill="#166534">"这个信息我确定吗？"</text>
  <text x="375" y="181" text-anchor="middle" font-size="10" fill="#166534">"让我从另一个角度验证..."</text>

  <line x1="375" y1="190" x2="375" y2="208" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="290" y="210" width="170" height="34" rx="6" fill="#4ade80" stroke="#16a34a" stroke-width="1.5"/>
  <text x="375" y="228" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">经过验证的答案</text>

  <!-- 数据对比 -->
  <rect x="20" y="262" width="460" height="64" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="250" y="280" text-anchor="middle" font-size="12" font-weight="bold" fill="#3730a3">SimpleQA 基准错误率对比</text>
  <text x="120" y="300" text-anchor="middle" font-size="11" fill="#4338ca">GPT-4o：38.2%</text>
  <text x="250" y="300" text-anchor="middle" font-size="11" fill="#4338ca">o1：16.0%（↓58%）</text>
  <text x="380" y="300" text-anchor="middle" font-size="11" fill="#4338ca">o3-mini：12.8%（↓66%）</text>
  <rect x="100" y="288" width="80" height="16" rx="3" fill="#c7d2fe" opacity="0.5"/>
  <rect x="228" y="288" width="44" height="16" rx="3" fill="#a5b4fc" opacity="0.5"/>
  <rect x="358" y="288" width="44" height="16" rx="3" fill="#818cf8" opacity="0.5"/>
</svg>