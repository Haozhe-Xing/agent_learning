<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#2C3E6B"/>
    </marker>
  </defs>
  <rect width="760" height="380" fill="#F8FAFC" rx="12"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A2340">RL 算法选型决策树</text>

  <!-- 根问题 -->
  <rect x="220" y="45" width="320" height="38" rx="8" fill="#2C3E6B"/>
  <text x="380" y="69" text-anchor="middle" font-size="13" fill="white" font-weight="bold">任务是否有客观可验证的评估标准？</text>

  <!-- 左分支线（否） -->
  <line x1="265" y1="83" x2="170" y2="115" stroke="#2C3E6B" stroke-width="2" marker-end="url(#a)"/>
  <text x="200" y="106" text-anchor="middle" font-size="12" fill="#E74C3C" font-weight="bold">否</text>

  <!-- 右分支线（是） -->
  <line x1="495" y1="83" x2="580" y2="115" stroke="#2C3E6B" stroke-width="2" marker-end="url(#a)"/>
  <text x="555" y="106" text-anchor="middle" font-size="12" fill="#27AE60" font-weight="bold">是</text>

  <!-- 左子问题 -->
  <rect x="40" y="115" width="260" height="38" rx="8" fill="#5D6D7E"/>
  <text x="170" y="139" text-anchor="middle" font-size="12" fill="white">任务评估主要依赖人类偏好？</text>

  <!-- 左子分支（是） -->
  <line x1="100" y1="153" x2="70" y2="185" stroke="#5D6D7E" stroke-width="2" marker-end="url(#a)"/>
  <text x="70" y="175" text-anchor="middle" font-size="11" fill="#27AE60" font-weight="bold">是</text>

  <!-- 左子分支（否） -->
  <line x1="240" y1="153" x2="270" y2="185" stroke="#5D6D7E" stroke-width="2" marker-end="url(#a)"/>
  <text x="268" y="175" text-anchor="middle" font-size="11" fill="#E74C3C" font-weight="bold">否</text>

  <!-- 左子子问题：偏好数据 -->
  <rect x="20" y="185" width="175" height="38" rx="8" fill="#8E44AD"/>
  <text x="107" y="203" text-anchor="middle" font-size="11" fill="white">有足够的偏好标注数据？</text>
  <text x="107" y="217" text-anchor="middle" font-size="10" fill="#E8DAEF">（人类偏好对比示例）</text>

  <line x1="60" y1="223" x2="60" y2="255" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="43" y="247" font-size="11" fill="#27AE60" font-weight="bold">是</text>
  <line x1="155" y1="223" x2="155" y2="255" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="157" y="247" font-size="11" fill="#E74C3C" font-weight="bold">否</text>

  <!-- DPO 推荐 -->
  <rect x="20" y="255" width="78" height="52" rx="8" fill="#27AE60"/>
  <text x="59" y="275" text-anchor="middle" font-size="13" fill="white" font-weight="bold">DPO</text>
  <text x="59" y="291" text-anchor="middle" font-size="10" fill="white">✅ 最简单</text>
  <text x="59" y="303" text-anchor="middle" font-size="10" fill="white">高效</text>

  <!-- 收集偏好数据或 PPO+RM -->
  <rect x="110" y="255" width="88" height="52" rx="8" fill="#7F8C8D"/>
  <text x="154" y="275" text-anchor="middle" font-size="11" fill="white">先收集</text>
  <text x="154" y="291" text-anchor="middle" font-size="11" fill="white">偏好数据</text>
  <text x="154" y="305" text-anchor="middle" font-size="10" fill="#BDC3C7">或 PPO+RM</text>

  <!-- 左否：考虑 SFT -->
  <rect x="238" y="185" width="122" height="52" rx="8" fill="#95A5A6"/>
  <text x="299" y="205" text-anchor="middle" font-size="11" fill="white">考虑是否真的</text>
  <text x="299" y="221" text-anchor="middle" font-size="11" fill="white">需要 RL</text>
  <text x="299" y="237" text-anchor="middle" font-size="10" fill="#ECF0F1">（也许 SFT 就够）</text>

  <!-- 右子问题：模型规模 -->
  <rect x="460" y="115" width="240" height="38" rx="8" fill="#1A6B9A"/>
  <text x="580" y="139" text-anchor="middle" font-size="12" fill="white">模型规模 &gt; 7B 参数？</text>

  <line x1="520" y1="153" x2="490" y2="185" stroke="#1A6B9A" stroke-width="2" marker-end="url(#a)"/>
  <text x="493" y="176" font-size="11" fill="#27AE60" font-weight="bold">是</text>
  <line x1="640" y1="153" x2="660" y2="185" stroke="#1A6B9A" stroke-width="2" marker-end="url(#a)"/>
  <text x="660" y="176" font-size="11" fill="#E74C3C" font-weight="bold">否</text>

  <!-- GRPO 推荐 -->
  <rect x="440" y="185" width="100" height="70" rx="8" fill="#27AE60"/>
  <text x="490" y="207" text-anchor="middle" font-size="14" fill="white" font-weight="bold">GRPO</text>
  <text x="490" y="225" text-anchor="middle" font-size="11" fill="white">✅ 显存友好</text>
  <text x="490" y="241" text-anchor="middle" font-size="11" fill="white">DeepSeek-R1</text>
  <text x="490" y="253" text-anchor="middle" font-size="11" fill="#D4EFDF">已验证</text>

  <!-- PPO or GRPO -->
  <rect x="568" y="185" width="120" height="70" rx="8" fill="#5D6D7E"/>
  <text x="628" y="207" text-anchor="middle" font-size="12" fill="white">PPO 或 GRPO</text>
  <text x="628" y="224" text-anchor="middle" font-size="11" fill="#BDC3C7">均可</text>

  <line x1="598" y1="255" x2="590" y2="283" stroke="#5D6D7E" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="658" y1="255" x2="665" y2="283" stroke="#5D6D7E" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="555" y="283" width="78" height="42" rx="6" fill="#2471A3"/>
  <text x="594" y="302" text-anchor="middle" font-size="11" fill="white" font-weight="bold">PPO</text>
  <text x="594" y="318" text-anchor="middle" font-size="10" fill="#AED6F1">通用工具链</text>

  <rect x="644" y="283" width="78" height="42" rx="6" fill="#1A7A52"/>
  <text x="683" y="302" text-anchor="middle" font-size="11" fill="white" font-weight="bold">GRPO</text>
  <text x="683" y="318" text-anchor="middle" font-size="10" fill="#A9DFBF">简洁高效</text>

  <!-- 底部说明 -->
  <rect x="30" y="350" width="700" height="22" rx="5" fill="#EBF5FB"/>
  <text x="380" y="365" text-anchor="middle" font-size="11" fill="#2471A3">💡 GRPO 在大规模模型上内存开销最低（无需 Critic 模型），已被 DeepSeek-R1 等顶尖模型验证有效</text>
</svg>
