<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="500" height="300" rx="12" fill="#f8fafc"/>
  <text x="250" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">自回归生成：逐步预测下一个 Token</text>

  <!-- 输入 -->
  <rect x="30" y="50" width="440" height="36" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="250" y="73" text-anchor="middle" font-size="13" fill="#1d4ed8">用户输入："今天天气"</text>

  <!-- 步骤 -->
  <rect x="30" y="104" width="440" height="32" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="30" y="125" font-size="11" fill="#166534" dx="12">第1步：模型输入 ["今天天气"]</text>
  <text x="380" y="125" font-size="12" font-weight="bold" fill="#15803d">→ 预测出 "真"</text>

  <rect x="30" y="142" width="440" height="32" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="30" y="163" font-size="11" fill="#166534" dx="12">第2步：模型输入 ["今天天气真"]</text>
  <text x="380" y="163" font-size="12" font-weight="bold" fill="#15803d">→ 预测出 "好"</text>

  <rect x="30" y="180" width="440" height="32" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="30" y="201" font-size="11" fill="#166534" dx="12">第3步：模型输入 ["今天天气真好"]</text>
  <text x="380" y="201" font-size="12" font-weight="bold" fill="#15803d">→ 预测出 "！"</text>

  <rect x="30" y="218" width="440" height="32" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="30" y="239" font-size="11" fill="#166534" dx="12">第4步：模型输入 ["今天天气真好！"]</text>
  <text x="380" y="239" font-size="12" font-weight="bold" fill="#15803d">→ 预测出 [结束]</text>

  <!-- 结果 -->
  <rect x="130" y="264" width="240" height="28" rx="8" fill="#4ade80" stroke="#16a34a" stroke-width="1.5"/>
  <text x="250" y="283" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">最终输出："真好！"</text>

  <!-- 说明 -->
  <text x="250" y="298" text-anchor="middle" font-size="10" fill="#64748b">每次只生成一个 Token，将其追加到输入后再预测下一个</text>
</svg>