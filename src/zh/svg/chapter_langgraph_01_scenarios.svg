<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" width="520" height="360" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="520" height="360" rx="12" fill="#f8fafc"/>
  <text x="260" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">LangGraph 典型业务场景：条件分支 + 循环</text>

  <!-- 场景一 -->
  <rect x="16" y="44" width="230" height="140" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="131" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">场景一：智能客服退货</text>
  <text x="131" y="78" text-anchor="middle" font-size="10" fill="#3b82f6">用户："我要退货"</text>
  <text x="131" y="94" text-anchor="middle" font-size="10" fill="#3b82f6">↓ 查询订单状态</text>
  <rect x="28" y="100" width="206" height="52" rx="6" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1"/>
  <text x="131" y="116" text-anchor="middle" font-size="10" fill="#1e40af">已发货 → 走退货流程</text>
  <text x="131" y="130" text-anchor="middle" font-size="10" fill="#1e40af">未发货 → 直接取消</text>
  <text x="131" y="144" text-anchor="middle" font-size="10" fill="#1e40af">超退货期 → 转人工客服</text>
  <text x="131" y="168" text-anchor="middle" font-size="9" fill="#3b82f6">不满意 → 回到"理解意图"重新处理</text>

  <!-- 场景二 -->
  <rect x="274" y="44" width="230" height="140" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="389" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">场景二：代码审查 Agent</text>
  <text x="389" y="78" text-anchor="middle" font-size="10" fill="#22c55e">提交代码 → 静态分析 → LLM 审查</text>
  <rect x="286" y="84" width="206" height="68" rx="6" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="389" y="100" text-anchor="middle" font-size="10" fill="#166534">发现安全问题 → 深度安全分析</text>
  <text x="389" y="114" text-anchor="middle" font-size="10" fill="#166534">发现性能问题 → 性能分析</text>
  <text x="389" y="128" text-anchor="middle" font-size="10" fill="#166534">都没问题 → 通过审查</text>
  <text x="389" y="142" text-anchor="middle" font-size="10" fill="#166534">所有结果 → 汇总报告</text>
  <text x="389" y="168" text-anchor="middle" font-size="9" fill="#22c55e">人类审核 → 批准/驳回</text>

  <!-- 场景三 -->
  <rect x="16" y="200" width="488" height="140" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="260" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#a16207">场景三：数据分析 Agent</text>
  <text x="260" y="234" text-anchor="middle" font-size="10" fill="#a16207">自然语言问题 → 理解意图 → 生成 SQL</text>
  <rect x="28" y="240" width="464" height="52" rx="6" fill="#fef08a" stroke="#facc15" stroke-width="1"/>
  <text x="260" y="256" text-anchor="middle" font-size="10" fill="#a16207">SQL 安全检查：不安全 → 重新生成 SQL（循环）</text>
  <text x="260" y="270" text-anchor="middle" font-size="10" fill="#a16207">SQL 安全 → 执行查询 → 分析数据 → 生成图表 → 生成洞察 → 输出报告</text>
  <text x="260" y="284" text-anchor="middle" font-size="10" fill="#a16207">用户追问 → 回到"理解意图"</text>
  <rect x="80" y="300" width="360" height="28" rx="6" fill="#eab308" stroke="#a16207" stroke-width="1.5"/>
  <text x="260" y="319" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">执行路径不是预先确定的，而是根据中间结果动态决定的</text>

  <!-- 说明 -->
  <rect x="16" y="350" width="488" height="4" rx="2" fill="#6366f1"/>
</svg>