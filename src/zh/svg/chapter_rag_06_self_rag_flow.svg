<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="480" height="300" rx="12" fill="#f8fafc"/>
  <text x="240" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Self-RAG：自适应检索工作流程</text>

  <rect x="160" y="44" width="160" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="240" y="63" text-anchor="middle" font-size="11" fill="#1d4ed8">用户提问："Python 3.12 新特性？"</text>
  <line x1="240" y1="72" x2="240" y2="88" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="100" y="90" width="280" height="28" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="240" y="109" text-anchor="middle" font-size="11" fill="#3730a3">模型思考 → [Retrieve: Yes]（时效性信息，需要检索）</text>
  <line x1="240" y1="118" x2="240" y2="134" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="100" y="136" width="280" height="28" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="240" y="155" text-anchor="middle" font-size="11" fill="#15803d">检索 → 返回文档</text>
  <line x1="240" y1="164" x2="240" y2="180" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="100" y="182" width="280" height="28" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="240" y="201" text-anchor="middle" font-size="11" fill="#a16207">模型评估 → [IsRel: Relevant]（文档相关）</text>
  <line x1="240" y1="210" x2="240" y2="226" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="100" y="228" width="280" height="28" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="240" y="247" text-anchor="middle" font-size="11" fill="#9d174d">生成回答</text>
  <line x1="240" y1="256" x2="240" y2="272" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="274" width="360" height="20" rx="6" fill="#4ade80" stroke="#16a34a" stroke-width="1.5"/>
  <text x="240" y="289" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">自检 → [IsSup: Fully Supported] [IsUse: 5] → 输出</text>
</svg>
