<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="520" height="200" rx="12" fill="#f0fdf4"/>
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Guardrails 增强的信任链</text>

  <!-- 用户输入 -->
  <rect x="16" y="50" width="90" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="61" y="75" text-anchor="middle" font-size="11" fill="#1d4ed8">用户输入</text>

  <line x1="106" y1="70" x2="130" y2="70" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 输入 Guardrails -->
  <rect x="132" y="44" width="110" height="52" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="187" y="64" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">输入 Guardrails</text>
  <text x="187" y="80" text-anchor="middle" font-size="10" fill="#166534">程序化检查</text>
  <text x="187" y="92" text-anchor="middle" font-size="10" fill="#166534">（不可绕过）</text>

  <line x1="242" y1="70" x2="266" y2="70" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- LLM -->
  <rect x="268" y="50" width="80" height="40" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="308" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca">LLM</text>

  <line x1="348" y1="70" x2="372" y2="70" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 输出 Guardrails -->
  <rect x="374" y="44" width="110" height="52" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="429" y="64" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">输出 Guardrails</text>
  <text x="429" y="80" text-anchor="middle" font-size="10" fill="#166534">程序化检查</text>
  <text x="429" y="92" text-anchor="middle" font-size="10" fill="#166534">（不可绕过）</text>

  <line x1="484" y1="70" x2="504" y2="70" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 最终输出 -->
  <rect x="506" y="50" width="8" height="40" rx="2" fill="#4ade80"/>

  <!-- 标注 -->
  <text x="187" y="118" text-anchor="middle" font-size="10" fill="#15803d">↑ 注入检测 / 话题约束</text>
  <text x="187" y="132" text-anchor="middle" font-size="10" fill="#15803d">PII 检测 / 格式限制</text>
  <text x="429" y="118" text-anchor="middle" font-size="10" fill="#15803d">↑ 内容安全 / 格式校验</text>
  <text x="429" y="132" text-anchor="middle" font-size="10" fill="#15803d">幻觉检测 / 合规审查</text>

  <!-- 说明 -->
  <rect x="16" y="152" width="488" height="36" rx="8" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="260" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">核心思想：不依赖模型"自觉性"，用代码强制保证安全</text>
  <text x="260" y="182" text-anchor="middle" font-size="10" fill="#166534">程序化检查 = 可审计 + 可动态调整 + 不可被 Prompt 绕过</text>
</svg>