<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340" width="500" height="340" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="500" height="340" rx="12" fill="#f8fafc"/>
  <text x="250" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">课程学习：从易到难的训练节奏</text>

  <!-- 阶段1 -->
  <rect x="24" y="46" width="452" height="80" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="80" y="68" font-size="13" font-weight="bold" fill="#15803d">第 1 阶段（Warm-up）</text>
  <text x="80" y="86" font-size="11" fill="#166534">先用简单问题建立基本能力</text>
  <rect x="280" y="56" width="180" height="60" rx="6" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="370" y="76" text-anchor="middle" font-size="11" fill="#166534">通过率：60%—80%</text>
  <text x="370" y="94" text-anchor="middle" font-size="11" fill="#166534">建立"做对有奖励"的</text>
  <text x="370" y="110" text-anchor="middle" font-size="11" fill="#166534">基本理解</text>

  <!-- 箭头 -->
  <line x1="250" y1="126" x2="250" y2="144" stroke="#6366f1" stroke-width="2.5">
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
  </line>
  <polygon points="244,144 256,144 250,154" fill="#6366f1"/>

  <!-- 阶段2 -->
  <rect x="24" y="156" width="452" height="80" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="80" y="178" font-size="13" font-weight="bold" fill="#a16207">第 2 阶段（Ramp-up）</text>
  <text x="80" y="196" font-size="11" fill="#a16207">逐步增加难度</text>
  <rect x="280" y="166" width="180" height="60" rx="6" fill="#fef08a" stroke="#facc15" stroke-width="1"/>
  <text x="370" y="186" text-anchor="middle" font-size="11" fill="#a16207">通过率：30%—60%</text>
  <text x="370" y="204" text-anchor="middle" font-size="11" fill="#a16207">模型开始探索</text>
  <text x="370" y="220" text-anchor="middle" font-size="11" fill="#a16207">更复杂的策略</text>

  <!-- 箭头 -->
  <polygon points="244,236 256,236 250,246" fill="#6366f1"/>

  <!-- 阶段3 -->
  <rect x="24" y="248" width="452" height="80" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="80" y="270" font-size="13" font-weight="bold" fill="#b91c1c">第 3 阶段（Challenge）</text>
  <text x="80" y="288" font-size="11" fill="#b91c1c">挑战高难度问题</text>
  <rect x="280" y="258" width="180" height="60" rx="6" fill="#fecaca" stroke="#f87171" stroke-width="1"/>
  <text x="370" y="278" text-anchor="middle" font-size="11" fill="#b91c1c">通过率：10%—30%</text>
  <text x="370" y="296" text-anchor="middle" font-size="11" fill="#b91c1c">涌现真正有创造性</text>
  <text x="370" y="312" text-anchor="middle" font-size="11" fill="#b91c1c">的解题策略</text>
</svg>