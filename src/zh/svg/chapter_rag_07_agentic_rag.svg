<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" width="520" height="320" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="520" height="320" rx="12" fill="#f8fafc"/>
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">朴素 RAG vs Agentic RAG</text>

  <!-- 朴素 RAG -->
  <rect x="16" y="46" width="488" height="44" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="30" y="64" font-size="11" font-weight="bold" fill="#b91c1c">朴素 RAG（固定水管）</text>
  <text x="30" y="80" font-size="11" fill="#ef4444">问题 → [检索 Top-K] → [拼接 Prompt] → [生成] → 答案</text>

  <!-- Agentic RAG -->
  <rect x="16" y="102" width="488" height="202" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="260" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">Agentic RAG（会思考的侦探）</text>

  <rect x="160" y="128" width="200" height="24" rx="6" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="260" y="145" text-anchor="middle" font-size="11" fill="#166534">问题</text>
  <line x1="260" y1="152" x2="260" y2="164" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="80" y="166" width="360" height="24" rx="6" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="260" y="183" text-anchor="middle" font-size="10" fill="#166534">「我需要查文档吗？还是我已经知道答案？」</text>
  <line x1="260" y1="190" x2="260" y2="202" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="80" y="204" width="360" height="24" rx="6" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="260" y="221" text-anchor="middle" font-size="10" fill="#166534">「用什么关键词查？原始问题够好还是需要改写？」</text>
  <line x1="260" y1="228" x2="260" y2="240" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="80" y="242" width="360" height="24" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="260" y="259" text-anchor="middle" font-size="10" fill="#a16207">检索 → 「查到的东西够回答这个问题吗？」→ 不够则换角度再查</text>
  <line x1="260" y1="266" x2="260" y2="278" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="80" y="280" width="360" height="24" rx="6" fill="#4ade80" stroke="#16a34a" stroke-width="1.5"/>
  <text x="260" y="297" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">最终答案（带引用，有事实支撑）</text>
</svg>