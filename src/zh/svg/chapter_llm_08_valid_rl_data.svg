<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <rect width="480" height="260" rx="12" fill="#f8fafc"/>
  <text x="240" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">有效 vs 无效 RL 训练数据</text>

  <!-- 无效数据 -->
  <rect x="20" y="48" width="205" height="180" rx="10" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="122" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#be123c">❌ 无效数据</text>
  <text x="122" y="88" text-anchor="middle" font-size="11" fill="#f43f5e">奖励恒为 0 或恒为 1</text>

  <rect x="36" y="100" width="173" height="50" rx="6" fill="#fecdd3" stroke="#fb7185" stroke-width="1"/>
  <text x="122" y="120" text-anchor="middle" font-size="11" fill="#9f1239">所有回答得分相同</text>
  <text x="122" y="138" text-anchor="middle" font-size="11" fill="#9f1239">（全 0 或全 1）</text>

  <rect x="36" y="162" width="173" height="52" rx="6" fill="#fca5a5" stroke="#ef4444" stroke-width="1.5"/>
  <text x="122" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="#7f1d1d">模型无法区分好坏</text>
  <text x="122" y="198" text-anchor="middle" font-size="11" fill="#b91c1c">学不到任何东西</text>

  <!-- 有效数据 -->
  <rect x="255" y="48" width="205" height="180" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="357" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">✅ 有效数据</text>
  <text x="357" y="88" text-anchor="middle" font-size="11" fill="#22c55e">同一问题有高分也有低分</text>

  <rect x="271" y="100" width="173" height="50" rx="6" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="357" y="120" text-anchor="middle" font-size="11" fill="#166534">G 个回答中</text>
  <text x="357" y="138" text-anchor="middle" font-size="11" fill="#166534">得分有高有低</text>

  <rect x="271" y="162" width="173" height="52" rx="6" fill="#4ade80" stroke="#16a34a" stroke-width="1.5"/>
  <text x="357" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">模型对比学习</text>
  <text x="357" y="198" text-anchor="middle" font-size="11" fill="#14532d">"这样做 +1，那样做 0"</text>

  <!-- 通过率说明 -->
  <rect x="20" y="238" width="440" height="16" rx="4" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="240" y="250" text-anchor="middle" font-size="10" fill="#3730a3">💡 有效区间：同一问题通过率在 20%~80% 之间，模型才能获得有效学习信号</text>
</svg>