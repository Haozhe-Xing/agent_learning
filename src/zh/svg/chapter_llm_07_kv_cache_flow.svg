<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 240" width="520" height="240" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="520" height="240" rx="12" fill="#f8fafc"/>
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">KV Cache：Prefill vs Decode 两阶段</text>

  <!-- Prefill -->
  <rect x="16" y="44" width="230" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="131" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">Prefill 阶段（计算密集型）</text>
  <text x="131" y="78" text-anchor="middle" font-size="10" fill="#3b82f6">输入完整 Prompt（并行处理）</text>
  <text x="131" y="94" text-anchor="middle" font-size="10" fill="#3b82f6">一次性计算所有 Token 的 Q/K/V</text>
  <text x="131" y="110" text-anchor="middle" font-size="10" fill="#3b82f6">初始化 KV Cache</text>
  <rect x="28" y="118" width="206" height="20" rx="4" fill="#bfdbfe" stroke="#60a5fa" stroke-width="1"/>
  <text x="131" y="132" text-anchor="middle" font-size="10" fill="#1e40af">GPU 算力充分利用 ✅</text>

  <!-- Decode -->
  <rect x="274" y="44" width="230" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="389" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">Decode 阶段（内存带宽密集型）</text>
  <text x="389" y="78" text-anchor="middle" font-size="10" fill="#22c55e">每次只处理 1 个新 Token</text>
  <text x="389" y="94" text-anchor="middle" font-size="10" fill="#22c55e">从 KV Cache 读取历史 K/V</text>
  <text x="389" y="110" text-anchor="middle" font-size="10" fill="#22c55e">注意力矩阵：1 × N（而非 N×N）</text>
  <rect x="286" y="118" width="206" height="20" rx="4" fill="#bbf7d0" stroke="#4ade80" stroke-width="1"/>
  <text x="389" y="132" text-anchor="middle" font-size="10" fill="#166534">瓶颈在显存带宽，非算力 ⚠️</text>

  <!-- KV Cache 说明 -->
  <rect x="16" y="158" width="488" height="70" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="260" y="176" text-anchor="middle" font-size="12" font-weight="bold" fill="#a16207">KV Cache 的代价</text>
  <text x="260" y="194" text-anchor="middle" font-size="11" fill="#a16207">显存 = 2 × n_layers × n_kv_heads × head_dim × seq_len × dtype_bytes</text>
  <text x="260" y="212" text-anchor="middle" font-size="10" fill="#a16207">Llama 2-70B（MHA）：~2.5 GB / 1K Token | Llama 3-70B（GQA）：~0.32 GB / 1K Token</text>
  <text x="260" y="224" text-anchor="middle" font-size="10" fill="#a16207">DeepSeek-V3（MLA）：~0.04 GB / 1K Token  ← 约 70 倍优化！</text>
</svg>