<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="400" height="280" rx="12" fill="#f8fafc"/>
  <text x="200" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Agentic RAG 智能路由决策</text>

  <!-- 用户提问 -->
  <rect x="120" y="44" width="160" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="63" text-anchor="middle" font-size="12" fill="#1d4ed8">用户提问</text>
  <line x1="200" y1="72" x2="200" y2="88" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 决策层 -->
  <rect x="80" y="90" width="240" height="28" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="200" y="109" text-anchor="middle" font-size="12" font-weight="bold" fill="#3730a3">Agentic RAG 决策层</text>

  <!-- 分支线 -->
  <line x1="200" y1="118" x2="200" y2="130" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="60" y1="130" x2="340" y2="130" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="60" y1="130" x2="60" y2="146" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="160" y1="130" x2="160" y2="146" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="260" y1="130" x2="260" y2="146" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="340" y1="130" x2="340" y2="146" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 四个检索策略 -->
  <rect x="16" y="148" width="88" height="36" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="60" y="163" text-anchor="middle" font-size="9" fill="#15803d">简单具体问题</text>
  <text x="60" y="176" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">普通向量检索</text>

  <rect x="116" y="148" width="88" height="36" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="160" y="163" text-anchor="middle" font-size="9" fill="#a16207">关系推理问题</text>
  <text x="160" y="176" text-anchor="middle" font-size="9" font-weight="bold" fill="#a16207">LightRAG 图检索</text>

  <rect x="216" y="148" width="88" height="36" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="260" y="163" text-anchor="middle" font-size="9" fill="#9d174d">全局分析问题</text>
  <text x="260" y="176" text-anchor="middle" font-size="9" font-weight="bold" fill="#9d174d">GraphRAG Global</text>

  <rect x="296" y="148" width="88" height="36" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="340" y="163" text-anchor="middle" font-size="9" fill="#3730a3">实时信息需求</text>
  <text x="340" y="176" text-anchor="middle" font-size="9" font-weight="bold" fill="#3730a3">Web 搜索</text>

  <!-- 合并 -->
  <line x1="60" y1="184" x2="60" y2="200" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="160" y1="184" x2="160" y2="200" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="260" y1="184" x2="260" y2="200" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="340" y1="184" x2="340" y2="200" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="60" y1="200" x2="340" y2="200" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="200" y1="200" x2="200" y2="216" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="80" y="218" width="240" height="28" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="200" y="237" text-anchor="middle" font-size="11" fill="#a16207">结果合并 + 质量评估</text>
  <line x1="200" y1="246" x2="200" y2="260" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="80" y="262" width="240" height="12" rx="4" fill="#4ade80" stroke="#16a34a" stroke-width="1.5"/>
  <text x="200" y="272" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">生成带引用的最终答案</text>
</svg>