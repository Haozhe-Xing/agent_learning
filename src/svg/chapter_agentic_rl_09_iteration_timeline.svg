<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4A90D9"/>
    </marker>
  </defs>

  <rect width="760" height="360" fill="#F8FAFC" rx="12"/>

  <!-- 标题 -->
  <rect x="0" y="0" width="760" height="52" rx="12" fill="#2C3E6B"/>
  <rect x="0" y="40" width="760" height="12" fill="#2C3E6B"/>
  <text x="380" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="white">典型迭代节奏（生产团队）</text>

  <!-- 时间轴线 -->
  <line x1="110" y1="295" x2="700" y2="295" stroke="#4A90D9" stroke-width="2" marker-end="url(#arr)"/>
  <text x="710" y="299" font-size="12" fill="#4A90D9">时间</text>

  <!-- 各周卡片数据 -->
  <!-- 第1周 -->
  <rect x="120" y="180" width="95" height="108" rx="8" fill="#EBF5FB" stroke="#4A90D9" stroke-width="1.5"/>
  <rect x="120" y="180" width="95" height="28" rx="8" fill="#4A90D9"/>
  <rect x="120" y="196" width="95" height="12" fill="#4A90D9"/>
  <text x="167" y="199" text-anchor="middle" font-size="12" fill="white" font-weight="bold">第 1 周</text>
  <text x="167" y="222" text-anchor="middle" font-size="11" fill="#1A5276">基础版 Agent</text>
  <text x="167" y="237" text-anchor="middle" font-size="11" fill="#1A5276">上线运行</text>
  <text x="167" y="257" text-anchor="middle" font-size="12" fill="#2471A3" font-weight="bold">~5,000</text>
  <text x="167" y="272" text-anchor="middle" font-size="11" fill="#5D6D7E">条轨迹收集</text>
  <!-- 底部竖线 -->
  <line x1="167" y1="288" x2="167" y2="295" stroke="#4A90D9" stroke-width="2"/>
  <circle cx="167" cy="295" r="5" fill="#4A90D9"/>

  <!-- 第2周 -->
  <rect x="235" y="150" width="95" height="138" rx="8" fill="#E9F7EF" stroke="#27AE60" stroke-width="1.5"/>
  <rect x="235" y="150" width="95" height="28" rx="8" fill="#27AE60"/>
  <rect x="235" y="166" width="95" height="12" fill="#27AE60"/>
  <text x="282" y="169" text-anchor="middle" font-size="12" fill="white" font-weight="bold">第 2 周</text>
  <text x="282" y="194" text-anchor="middle" font-size="11" fill="#1E8449">过滤筛选</text>
  <text x="282" y="212" text-anchor="middle" font-size="12" fill="#1A5276" font-weight="bold">~3,000</text>
  <text x="282" y="227" text-anchor="middle" font-size="11" fill="#5D6D7E">高质量样本</text>
  <text x="282" y="247" text-anchor="middle" font-size="11" fill="#1E8449">↓ SFT 微调</text>
  <text x="282" y="263" text-anchor="middle" font-size="12" fill="#27AE60" font-weight="bold">v0.2</text>
  <line x1="282" y1="288" x2="282" y2="295" stroke="#27AE60" stroke-width="2"/>
  <circle cx="282" cy="295" r="5" fill="#27AE60"/>

  <!-- 第3-4周 -->
  <rect x="350" y="120" width="95" height="168" rx="8" fill="#FEF9E7" stroke="#F39C12" stroke-width="1.5"/>
  <rect x="350" y="120" width="95" height="28" rx="8" fill="#F39C12"/>
  <rect x="350" y="136" width="95" height="12" fill="#F39C12"/>
  <text x="397" y="139" text-anchor="middle" font-size="12" fill="white" font-weight="bold">第 3–4 周</text>
  <text x="397" y="164" text-anchor="middle" font-size="11" fill="#7D6608">v0.2 更好轨迹</text>
  <text x="397" y="181" text-anchor="middle" font-size="12" fill="#E67E22" font-weight="bold">2× 成功率</text>
  <text x="397" y="200" text-anchor="middle" font-size="11" fill="#5D6D7E">持续积累</text>
  <text x="397" y="217" text-anchor="middle" font-size="12" fill="#E67E22" font-weight="bold">10,000 条</text>
  <text x="397" y="235" text-anchor="middle" font-size="11" fill="#5D6D7E">轨迹数据</text>
  <line x1="397" y1="288" x2="397" y2="295" stroke="#F39C12" stroke-width="2"/>
  <circle cx="397" cy="295" r="5" fill="#F39C12"/>

  <!-- 第5-6周 -->
  <rect x="465" y="100" width="95" height="188" rx="8" fill="#F9EBF8" stroke="#8E44AD" stroke-width="1.5"/>
  <rect x="465" y="100" width="95" height="28" rx="8" fill="#8E44AD"/>
  <rect x="465" y="116" width="95" height="12" fill="#8E44AD"/>
  <text x="512" y="119" text-anchor="middle" font-size="12" fill="white" font-weight="bold">第 5–6 周</text>
  <text x="512" y="144" text-anchor="middle" font-size="11" fill="#6C3483">过滤筛选</text>
  <text x="512" y="162" text-anchor="middle" font-size="11" fill="#6C3483">+ DPO 对比</text>
  <text x="512" y="181" text-anchor="middle" font-size="11" fill="#5D6D7E">加入失败轨迹</text>
  <text x="512" y="199" text-anchor="middle" font-size="11" fill="#5D6D7E">正负对比训练</text>
  <text x="512" y="219" text-anchor="middle" font-size="11" fill="#8E44AD">↓ DPO 微调</text>
  <text x="512" y="238" text-anchor="middle" font-size="12" fill="#8E44AD" font-weight="bold">v0.3</text>
  <line x1="512" y1="288" x2="512" y2="295" stroke="#8E44AD" stroke-width="2"/>
  <circle cx="512" cy="295" r="5" fill="#8E44AD"/>

  <!-- 第7-8周 -->
  <rect x="580" y="80" width="95" height="208" rx="8" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1.5"/>
  <rect x="580" y="80" width="95" height="28" rx="8" fill="#E74C3C"/>
  <rect x="580" y="96" width="95" height="12" fill="#E74C3C"/>
  <text x="627" y="99" text-anchor="middle" font-size="12" fill="white" font-weight="bold">第 7–8 周+</text>
  <text x="627" y="125" text-anchor="middle" font-size="11" fill="#922B21">v0.3 显著优于</text>
  <text x="627" y="142" text-anchor="middle" font-size="11" fill="#922B21">v0.1</text>
  <text x="627" y="163" text-anchor="middle" font-size="11" fill="#5D6D7E">持续收集更好</text>
  <text x="627" y="180" text-anchor="middle" font-size="11" fill="#5D6D7E">质量的轨迹...</text>
  <text x="627" y="204" text-anchor="middle" font-size="12" fill="#E74C3C">每 2–4 周</text>
  <text x="627" y="221" text-anchor="middle" font-size="11" fill="#E74C3C">一个新版本</text>
  <text x="627" y="240" text-anchor="middle" font-size="11" fill="#922B21">能力持续提升</text>
  <text x="627" y="258" text-anchor="middle" font-size="12" fill="#E74C3C" font-weight="bold">→ v0.4, v1.0...</text>
  <line x1="627" y1="288" x2="627" y2="295" stroke="#E74C3C" stroke-width="2"/>
  <circle cx="627" cy="295" r="5" fill="#E74C3C"/>

  <!-- 底部注释 -->
  <rect x="40" y="318" width="680" height="32" rx="6" fill="#EBF5FB"/>
  <text x="380" y="336" text-anchor="middle" font-size="12" fill="#2471A3" font-weight="bold">💡 关键原则：</text>
  <text x="380" y="336" text-anchor="middle" font-size="12" fill="#2471A3"> </text>
  <text x="170" y="336" text-anchor="start" font-size="12" fill="#5D6D7E">模型越强 → 轨迹越好 → 数据越好 → 训练效果越好 → 正向复利飞轮</text>
</svg>
